<div class="component w-50 mx-auto shadow p-5">
    <form [formGroup]="loginForm" (ngSubmit)="submitForm()">
        <div class="mb-3">
            <label for="userName" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" formControlName="username">
            <span *ngIf="!Username.valid && Username.touched" class="err-msg">* Please provide username</span>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" formControlName="password">
            <span *ngIf="!Password.valid && Password.touched" class="err-msg">* Please provide password</span>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Remember Password</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary mx-2">Reset</button>
    </form>   
    <div class="mt-5">
        Not registered yet? <a [routerLink]="['register']" class="redirection-link">Create an account <i class="fa-solid fa-up-right-from-square"></i></a>
    </div> 
</div>
